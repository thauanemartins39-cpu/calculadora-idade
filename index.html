<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Idade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Calculadora de Idade</h1>
        <p>Preencha seus dados e escolha um ano para calcular qual será sua idade.</p>
        <form id="form-idade">
            <div class="form-group">
                <label for="nomeCompleto">Nome Completo:</label>
                <input type="text" id="nomeCompleto" placeholder="Ex: Maria da Silva" required>
            </div>
            <div class="form-group">
                <label for="anoNascimento">Ano de Nascimento:</label>
                <input type="number" id="anoNascimento" placeholder="Ex: 1990" required>
            </div>
            <div class="form-group">
                <label for="anoCalculo">Calcular idade para o ano:</label>
                <input type="number" id="anoCalculo" placeholder="Ex: 2030" required>
            </div>
            <button type="submit">Calcular Idade</button>
        </form>
        <p id="mensagemErro" class="erro"></p>
        <div id="resultado" class="hidden">
            <h2>Resultado:</h2>
            <p id="textoResultado"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
